<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects — Jordan Yerbury, Architect</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: Arial, Helvetica, sans-serif; -webkit-font-smoothing: antialiased; background: #fff; color: #111; min-height: 100%; }

    /* ── NAV ── */
    nav { position: fixed; top: 0; right: 0; padding: 1.4rem 1.8rem; z-index: 100; }
    .jot-wrap { position: relative; display: inline-block; }
    .jot-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; }
    .jot-btn:hover svg { opacity: 0.75; }
    .dropdown {
      position: absolute; top: calc(100% + 0.5rem); right: 0; min-width: 210px; background: #fff;
      display: flex; flex-direction: column; opacity: 0; pointer-events: none;
      transform: translateY(-6px); transition: opacity 0.18s ease, transform 0.18s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .jot-wrap:hover .dropdown, .jot-wrap:focus-within .dropdown { opacity: 1; pointer-events: all; transform: translateY(0); }
    .dropdown a {
      display: flex; align-items: center; gap: 0.7rem; padding: 0.8rem 1.1rem;
      color: #002FA7; text-decoration: none; font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid #e4e8f5;
      transition: background 0.12s, color 0.12s;
    }
    .dropdown a:last-child { border-bottom: none; }
    .dropdown a:hover { background: #002FA7; color: #fff; }
    .dropdown a.active { color: #002FA7; border-left: 3px solid #002FA7; }

    /* ── PAGE ── */
    .page { max-width: 1200px; margin: 0 auto; padding: 5rem 2rem 4rem; }

    /* ── HEADER ── */
    .port-header {
      display: flex; flex-wrap: wrap; align-items: flex-end;
      justify-content: space-between; gap: 1rem;
      padding-bottom: 2rem; border-bottom: 2px solid #111;
      margin-bottom: 2.5rem;
    }
    .port-title { font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; text-transform: uppercase; line-height: 1; letter-spacing: -0.02em; }
    .port-sub { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: #777; margin-top: 0.5rem; }
    .port-sub .sep { margin: 0 0.4rem; opacity: 0.4; }
    .dl-btn {
      display: inline-flex; flex-direction: column; align-items: center;
      background: #002FA7; color: #fff; padding: 0.7rem 1.2rem; text-decoration: none;
      font-weight: 700; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      transition: background 0.15s; flex-shrink: 0;
    }
    .dl-btn:hover { background: #001e6e; }
    .dl-size { font-size: 0.58rem; font-weight: 400; opacity: 0.7; margin-top: 0.15rem; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      background: #ddd;
      border: 1px solid #ddd;
    }

    .card {
      background: #fff;
      display: flex; flex-direction: column;
      cursor: pointer; text-decoration: none; color: #111;
      transition: opacity 0.15s;
      overflow: hidden;
    }
    .card:hover { opacity: 0.85; }
    .card:hover .card-img { transform: scale(1.03); }

    .card-img-wrap { overflow: hidden; aspect-ratio: 16/9; background: #e8e8e8; }
    .card-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.35s ease;
      display: block;
    }
    .card-placeholder {
      width: 100%; height: 100%; background: #1a1a1a;
      display: flex; align-items: center; justify-content: center;
    }
    .card-placeholder span { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

    .card-info { padding: 0.9rem 1rem 1rem; display: flex; align-items: baseline; gap: 0.6rem; }
    .card-num { font-size: 0.6rem; letter-spacing: 0.12em; color: #aaa; font-weight: 700; }
    .card-title { font-size: 0.88rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── FOOTER ── */
    footer {
      margin-top: 4rem; background: #111; color: rgba(255,255,255,0.55);
      font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 1.6rem 2rem; display: flex; flex-wrap: wrap;
      align-items: center; justify-content: space-between; gap: 0.8rem;
    }
    footer a { color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: #fff; }
    .footer-links { display: flex; gap: 1.4rem; flex-wrap: wrap; }
  </style>
</head>
<body>

  <nav>
    <div class="jot-wrap">
      <button class="jot-btn" aria-label="Menu" aria-haspopup="true">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="white" stroke-width="22" width="38" height="38">
          <path d="M 86,45 L 194,145 Q 205,155 205,170 L 205,428 Q 205,448 185,448 L 95,448 Q 75,448 75,428 L 75,50 Q 75,35 86,45 Z"/>
          <path d="M 426,45 L 318,145 Q 307,155 307,170 L 307,428 Q 307,448 327,448 L 417,448 Q 437,448 437,428 L 437,50 Q 437,35 426,45 Z"/>
        </svg>
      </button>
      <div class="dropdown" role="menu">
        <a href="https://staircode.app" target="_blank" rel="noopener" role="menuitem">
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="22" height="22" style="border-radius:3px;flex-shrink:0">
            <rect width="512" height="512" fill="#1050C8" rx="52"/>
            <path d="M 413,165 A 182,182 0 0,1 165,413" fill="none" stroke="#F05020" stroke-width="50" stroke-linecap="butt"/>
            <path d="M 99,347 A 182,182 0 0,1 347,99" fill="none" stroke="#F05020" stroke-width="50" stroke-linecap="butt"/>
            <circle cx="256" cy="256" r="157" fill="white"/>

          </svg>
          StairCode
        </a>
        <a href="/portfolio" role="menuitem" class="active">Projects</a>
        <a href="https://justopenarch.com" target="_blank" rel="noopener" role="menuitem">Just Open Arch</a>
        <a href="/about" role="menuitem">About</a>
        <a href="/blog" role="menuitem">Blog</a>
        <a href="/legal" role="menuitem">Legal</a>
      </div>
    </div>
  </nav>

  <!-- Note: The nav logo above renders white because the JOT SVG has white stroke.
       But on a white page background it disappears. Fix: wrap in a Klein blue pill. -->
  <style>
    .jot-btn { background: #002FA7; border-radius: 4px; padding: 0.45rem 0.55rem; }
    .jot-btn:hover { background: #001e6e; }
  </style>

  <div class="page">
    <div class="port-header">
      <div>
        <h1 class="port-title">Selected<br>Works</h1>
        <p class="port-sub">Jordan Yerbury<span class="sep">·</span>Architect OAA<span class="sep">·</span>MRAIC<span class="sep">·</span>AIA</p>
      </div>
      <a class="dl-btn" href="/Jordan_Yerbury_Portfolio_2026.pdf" download>
        ↓ Download Portfolio
        <span class="dl-size">PDF · High Resolution · 30 MB</span>
      </a>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <footer>
    <span>© 2026 Just Open Technologies Inc.</span>
    <div class="footer-links">
      <a href="/about">About</a>
      <a href="/blog">Blog</a>
      <a href="/legal">Legal</a>
      <a href="mailto:hello@justopen.tech">hello@justopen.tech</a>
    </div>
  </footer>

  <script src="projects-data.js"></script>
  <script>
    var grid = document.getElementById('grid');
    PROJECTS.forEach(function(cat) {
      var a = document.createElement('a');
      a.className = 'card';
      a.href = 'project.html?cat=' + cat.id;
      a.innerHTML =
        '<div class="card-img-wrap">' +
          (cat.cover
            ? '<img class="card-img" src="' + cat.cover + '" alt="' + cat.title + '" loading="lazy"/>'
            : '<div class="card-placeholder"><span>Coming Soon</span></div>') +
        '</div>' +
        '<div class="card-info">' +
          '<span class="card-num">' + cat.num + '</span>' +
          '<span class="card-title">' + cat.title + '</span>' +
        '</div>';
      grid.appendChild(a);
    });
  </script>

</body>
</html>
