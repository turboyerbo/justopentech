<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just Open Technologies</title>
  <meta name="description" content="Just Open Technologies — software and architecture, open by design." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #002FA7; font-family: Arial, Helvetica, sans-serif; -webkit-font-smoothing: antialiased; }

    nav { position: fixed; top: 0; right: 0; padding: 1.4rem 1.8rem; z-index: 100; }
    .jot-wrap { position: relative; display: inline-block; }
    .jot-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; }
    .jot-btn:hover svg { opacity: 0.75; }

    .dropdown {
      position: absolute; top: calc(100% + 0.5rem); right: 0;
      min-width: 210px; background: #fff; display: flex; flex-direction: column;
      opacity: 0; pointer-events: none; transform: translateY(-6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .jot-wrap:hover .dropdown, .jot-wrap:focus-within .dropdown {
      opacity: 1; pointer-events: all; transform: translateY(0);
    }
    .dropdown a {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.8rem 1.1rem; color: #002FA7; text-decoration: none;
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; border-bottom: 1px solid #e4e8f5;
      transition: background 0.12s, color 0.12s;
    }
    .dropdown a:last-child { border-bottom: none; }
    .dropdown a:hover { background: #002FA7; color: #fff; }
    .dropdown a svg { flex-shrink: 0; transition: stroke 0.12s; }

    main {
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 6rem 2rem 8rem; text-align: center;
    }
    h1 {
      color: #fff; font-family: Arial, Helvetica, sans-serif; font-weight: 900;
      font-size: clamp(2.4rem, 8vw, 7rem); line-height: 1.0;
      letter-spacing: -0.01em; text-transform: uppercase;
    }

    footer {
      background: #001e6e; color: rgba(255,255,255,0.55);
      font-family: Arial, Helvetica, sans-serif; font-size: 0.72rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 1.6rem 2rem; display: flex; flex-wrap: wrap;
      align-items: center; justify-content: space-between; gap: 0.8rem;
    }
    footer a { color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: #fff; }
    .footer-links { display: flex; gap: 1.4rem; flex-wrap: wrap; }
  </style>
</head>
<body>

  <nav>
    <div class="jot-wrap">
      <button class="jot-btn" aria-label="Just Open Technologies menu" aria-haspopup="true">
        <!-- JOT logo: two panels opening upward, white stroke -->
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="white" stroke-width="22" width="38" height="38">
          <path d="M 86,45 L 194,145 Q 205,155 205,170 L 205,428 Q 205,448 185,448 L 95,448 Q 75,448 75,428 L 75,50 Q 75,35 86,45 Z"/>
          <path d="M 426,45 L 318,145 Q 307,155 307,170 L 307,428 Q 307,448 327,448 L 417,448 Q 437,448 437,428 L 437,50 Q 437,35 426,45 Z"/>
        </svg>
      </button>
      <div class="dropdown" role="menu">

        <a href="https://staircode.app" target="_blank" rel="noopener" role="menuitem">
          <!-- StairCode logo -->
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="22" height="22" style="border-radius:3px;flex-shrink:0">
            <rect width="512" height="512" fill="#1050C8" rx="52"/>
            <path d="M 413,165 A 182,182 0 0,1 165,413" fill="none" stroke="#F05020" stroke-width="50" stroke-linecap="butt"/>
            <path d="M 99,347 A 182,182 0 0,1 347,99" fill="none" stroke="#F05020" stroke-width="50" stroke-linecap="butt"/>
            <circle cx="256" cy="256" r="157" fill="white"/>
            <path d="M 148,200 L 282,200 L 282,310 L 368,310" fill="none" stroke="#7A8CA0" stroke-width="44" stroke-linecap="square" stroke-linejoin="miter"/>
          </svg>
          StairCode
        </a>

        <a href="/portfolio" role="menuitem">Projects</a>
        <a href="https://justopenarch.com" target="_blank" rel="noopener" role="menuitem">
          <!-- JOA logo: two panels pointing to bottom V -->
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="22" width="22" height="22" style="flex-shrink:0">
            <path d="M 90,42 L 190,42 Q 205,42 205,57 L 205,318 Q 205,333 210,347 L 256,472 L 95,472 Q 75,472 75,452 L 75,57 Q 75,42 90,42 Z"/>
            <path d="M 322,42 L 422,42 Q 437,42 437,57 L 437,452 Q 437,472 417,472 L 256,472 L 302,347 Q 307,333 307,318 L 307,57 Q 307,42 322,42 Z"/>
          </svg>
          Just Open Arch
        </a>

        <a href="/about" role="menuitem">About</a>
        <a href="/blog" role="menuitem">Blog</a>
        <a href="/legal" role="menuitem">Legal</a>
      </div>
    </div>
  </nav>

  <main>
    <h1>Just Open<br>Technologies</h1>
  </main>

  <footer>
    <span>© 2026 Just Open Technologies Inc.</span>
    <div class="footer-links">
      <a href="/about">About</a>
      <a href="/blog">Blog</a>
      <a href="/legal">Legal</a>
      <a href="mailto:hello@justopen.tech">hello@justopen.tech</a>
    </div>
  </footer>

</body>
</html>
